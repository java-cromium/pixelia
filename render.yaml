databases:
  - name: pixelia-db
    databaseName: pixelia_production
    user: pixelia_user
    plan: starter # You can adjust plans based on your budget

services:
  # 1. Redis Instance for Sidekiq
  - type: redis
    name: pixelia-redis
    plan: starter
    ipAllowList: [] # Keeps Redis internal and secure

  # 2. The Main Rails Web Server
  - type: web
    name: pixelia-web
    env: ruby
    plan: starter
    buildCommand: "./bin/render-build.sh" 
    startCommand: "bundle exec puma -C config/puma.rb"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pixelia-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: pixelia-redis
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false # You will input this manually in the Render dashboard

  # 3. The Sidekiq Background Worker
  - type: worker
    name: pixelia-worker
    env: ruby
    plan: starter
    buildCommand: "bundle install"
    startCommand: "bundle exec sidekiq -C config/sidekiq.yml"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pixelia-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: pixelia-redis
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false