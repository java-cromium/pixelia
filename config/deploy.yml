# Name of your application. Used to uniquely configure containers.
service: pixelia

# Name of the container image.
image: your-user/pixelia

# Deploy to these servers.
servers:
  web:
    - 192.168.0.1
    labels:
      traefik.http.routers.pixelia.rule: Host(`pixelia.com`) || HostRegexp(`{subdomain:.+}.pixelia.com`)
  job:
    hosts:
      - 192.168.0.1
    cmd: bundle exec sidekiq -C config/sidekiq.yml

# Enable SSL auto certification via Let's Encrypt and allow for multiple apps on a single web server.
proxy:
  ssl: true
  host: pixelia.com

# Credentials for your image host.
registry:
  # Specify the registry server, if you're not using Docker Hub
  # server: registry.digitalocean.com / ghcr.io / ...
  username: your-user

  # Always use an access token rather than real password when possible.
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - PIXELIA_DATABASE_PASSWORD
    - REDIS_URL
    - ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY
    - ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY
    - ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT
  clear:
    RAILS_ENV: production
    RAILS_LOG_LEVEL: info
    APP_HOST: pixelia.com
    DB_HOST: pixelia-db
    SMTP_ADDRESS: smtp.gmail.com
    SMTP_PORT: 587
    WEB_CONCURRENCY: 2
    RAILS_MAX_THREADS: 5

# Aliases are triggered with "bin/kamal <alias>". You can overwrite arguments on invocation:
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole"

# Persistent storage for Active Storage and other files.
volumes:
  - "pixelia_storage:/rails/storage"

# Bridge fingerprinted assets between versions to avoid 404s on in-flight requests.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64

# Use accessory services (secrets come from .kamal/secrets).
accessories:
  db:
    image: postgres:16
    host: 192.168.0.1
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_DB: pixelia_production
        POSTGRES_USER: pixelia
      secret:
        - PIXELIA_DATABASE_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
  redis:
    image: redis:7
    host: 192.168.0.1
    port: "127.0.0.1:6379:6379"
    directories:
      - data:/data
